<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    <title>Job Application Tracker</title>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
    <header class="container mx-auto my-[60px]">
        <h1 class="font-bold text-[#002C5C] text-3xl">Job Application Tracker</h1>
        <div class="card-container grid sm:grid-cols-3 gap-4">
            <div class="card p-5 shadow">
                <p class="font-medium text-[#323B49]">Total</p>
                <h2 class="font-bold  text-2xl">8</h2>  
            </div>
            <div class="card p-5 shadow">
                <p class="font-medium text-[#323B49]">Interview</p>
                <h2 class="font-bold text-[#10B981] text-2xl">0</h2>  
            </div>
            <div class="card p-5 shadow">
                <p class="font-medium text-[#323B49]">Rejected</p>
                <h2 class="font-bold text-[#EF4444] text-2xl">0</h2>  
            </div>
        </div>
        <hr class="my-[30px] text-[#E6E7E9]">
    </header>
    <main class="container mx-auto">
        <section>
            <div class="flex justify-between">
                <h1 class="font-semibold text-xl text-[#111827]">Available Jobs</h1>
                <h4 class="text-[16px] text-[#323B49]"><span>8</span> jobs</h4>
            </div>
            <div class="my-8">
                <button class="btn btn-primary w-20">All</button>
                <button class="btn w-20 text-[#64748B] mx-2">Interview</button>
                <button class="btn w-20 text-[#64748B]">Rejected</button>
            </div>
        </section>
    </main>
</body>
</html>
